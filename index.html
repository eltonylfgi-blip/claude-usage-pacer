<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Usage Pacer</title>
<meta name="description" content="Pace your weekly Claude usage so you don't run out before the reset. Free, open-source, single-file.">
<meta property="og:title" content="Claude Usage Pacer">
<meta property="og:description" content="Pace your weekly Claude usage so you don't run out before the reset. Free & open-source.">
<meta property="og:type" content="website">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --card2:#22262f; --txt:#e8eaed; --muted:#9aa0aa;
    --line:#2d323c; --accent:#6aa3ff; --green:#36c275; --amber:#f0b429; --red:#ef5b5b;
    --shadow:0 6px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--txt);padding:22px;line-height:1.45}
  .wrap{max-width:560px;margin:0 auto}
  .head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .head .right{display:flex;gap:8px;align-items:center}
  h1{font-size:20px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .cloud,#lang{font-size:11px;color:var(--muted);white-space:nowrap;border:1px solid var(--line);
    border-radius:20px;padding:5px 10px;background:var(--card)}
  #lang{cursor:pointer}
  .cloud.ok{color:#bff0d3;border-color:rgba(54,194,117,.4)}
  .cloud.off{color:#f6dd9a;border-color:rgba(240,180,41,.4)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
  label{display:block;font-size:13px;color:var(--muted);margin:0 0 6px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .field{flex:1;min-width:130px;margin-bottom:12px}
  input{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:11px 12px;font-size:16px}
  input:focus{outline:none;border-color:var(--accent)}
  button{background:var(--accent);color:#0a0c10;border:none;border-radius:10px;
    padding:12px 16px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
  button:active{transform:translateY(1px)}
  .banner{border-radius:14px;padding:16px 18px;text-align:center;margin-bottom:4px}
  .banner .big{font-size:30px;font-weight:800;letter-spacing:-.5px}
  .banner .small{font-size:14px;opacity:.92;margin-top:2px}
  .b-green{background:rgba(54,194,117,.14);border:1px solid rgba(54,194,117,.4);color:#bff0d3}
  .b-amber{background:rgba(240,180,41,.13);border:1px solid rgba(240,180,41,.4);color:#f6dd9a}
  .b-red{background:rgba(239,91,91,.13);border:1px solid rgba(239,91,91,.4);color:#f6bcbc}
  .stats{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .stat{flex:1 1 calc(50% - 5px);background:var(--card2);border:1px solid var(--line);border-radius:12px;
    padding:12px;text-align:center}
  .stat.hero{background:rgba(106,163,255,.12);border-color:rgba(106,163,255,.4)}
  .stat .n{font-size:22px;font-weight:700}
  .stat .l{font-size:11px;color:var(--muted);margin-top:2px}
  .gauge{margin-top:16px}
  .track{position:relative;height:16px;background:var(--card2);border-radius:10px;
    border:1px solid var(--line);overflow:visible}
  .fill{position:absolute;top:0;left:0;height:100%;border-radius:10px;
    background:linear-gradient(90deg,#4f8bff,#6aa3ff)}
  .pace{position:absolute;top:-5px;width:2px;height:26px;background:#fff;border-radius:2px}
  .pace::after{content:attr(data-label);position:absolute;top:-16px;left:50%;
    transform:translateX(-50%);font-size:9px;color:#fff;white-space:nowrap}
  .glabels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}
  h2{font-size:14px;color:var(--muted);font-weight:600;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px}
  .logrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
  .logrow .d{width:80px;color:var(--muted)}
  .bar{flex:1;height:9px;background:var(--card2);border-radius:6px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--accent)}
  .logrow .v{width:42px;text-align:right;font-variant-numeric:tabular-nums}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  details{margin-top:10px}
  summary{cursor:pointer;color:var(--muted);font-size:13px}
  .danger{color:var(--red);background:none;border:1px solid var(--red);width:auto;padding:8px 12px;font-size:13px;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div><h1 data-i18n="appTitle">Claude Usage Pacer</h1></div>
    <div class="right">
      <select id="lang" aria-label="Language">
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
      <span id="cloud" class="cloud">…</span>
    </div>
  </div>
  <p class="sub" data-i18n="sub"></p>

  <div class="card">
    <div class="row">
      <div class="field">
        <label data-i18n="pctLabel"></label>
        <input id="pct" type="number" inputmode="decimal" min="0" max="100" step="0.1" data-i18n-ph="pctPh">
      </div>
      <div class="field">
        <label data-i18n="sonnetLabel"></label>
        <input id="sonnet" type="number" inputmode="decimal" min="0" max="100" step="0.1" data-i18n-ph="sonnetPh">
      </div>
    </div>
    <button id="saveBtn" data-i18n="saveBtn"></button>
    <div class="hint" id="savedHint"></div>
  </div>

  <div class="card">
    <div id="banner" class="banner b-green">
      <div class="big" id="bigMsg">—</div>
      <div class="small" id="smallMsg"></div>
    </div>

    <div class="stats">
      <div class="stat hero"><div class="n" id="sCap">—</div><div class="l" data-i18n="capLabel"></div></div>
      <div class="stat"><div class="n" id="sToday">—</div><div class="l" data-i18n="todayLabel"></div></div>
      <div class="stat"><div class="n" id="sRate">—</div><div class="l" data-i18n="rateLabel"></div></div>
      <div class="stat"><div class="n" id="sDays">—</div><div class="l" data-i18n="daysLabel"></div></div>
    </div>

    <div class="gauge">
      <div class="track">
        <div class="fill" id="fill" style="width:0%"></div>
        <div class="pace" id="paceMark" style="left:0%" data-label=""></div>
      </div>
      <div class="glabels"><span>0%</span><span id="usedLbl"></span><span>100%</span></div>
      <div class="hint" data-i18n="gaugeHint"></div>
    </div>
  </div>

  <div class="card">
    <h2 data-i18n="weekTitle"></h2>
    <div id="logList"></div>
    <div class="hint" id="emptyLog" data-i18n="emptyLog"></div>
  </div>

  <div class="card">
    <h2 data-i18n="settingsTitle"></h2>
    <div class="field">
      <label data-i18n="resetLabel"></label>
      <input id="resetDate" type="date">
    </div>
    <div class="hint" data-i18n="resetHint"></div>
    <details>
      <summary data-i18n="clearSummary"></summary>
      <button class="danger" id="clearBtn" data-i18n="clearBtn"></button>
    </details>
  </div>

  <p class="sub" style="text-align:center" data-i18n="footer"></p>
</div>

<script>
// ============================================================
//  CONFIG — Optional cross-device sync / Sincronización opcional
//  By default this app stores everything in your browser (local mode),
//  no server. To sync phone <-> laptop, create a free project at
//  https://supabase.com, create the tables (SQL in the README) and paste
//  your URL + publishable/anon key (it's PUBLIC, protected by RLS):
// ============================================================
const SUPABASE_URL = '';   // e.g. 'https://xxxx.supabase.co'
const SUPABASE_KEY = '';   // e.g. 'sb_publishable_...'
const OWNER        = 'me';
// ============================================================

// ---------- i18n ----------
const T = {
  en: {
    appTitle:"Claude Usage Pacer",
    sub:"Pace your weekly Claude usage so you don't run out before the reset. Type the % you see in the Claude app and it tells you how far you can go today. Works offline; optional sync across devices (see README).",
    pctLabel:"Weekly % used (all models)", sonnetLabel:"Sonnet % used (optional)",
    pctPh:"e.g. 4", sonnetPh:"e.g. 3",
    saveBtn:"Save today",
    capLabel:"TODAY you can reach", todayLabel:"left for today", rateLabel:"per-day pace", daysLabel:"days to reset",
    gaugeHint:"Blue = used so far. The white tick = the cap you can reach TODAY. Fill the blue up to the tick and you're on track.",
    paceTick:"today's cap",
    weekTitle:"This week", emptyLog:"Nothing logged this week yet.",
    settingsTitle:"Settings", resetLabel:"Weekly reset date",
    resetHint:"The cycle is 7 days and rolls over by itself. If your reset is another day, change it here.",
    clearSummary:"Delete my history", clearBtn:"Delete all records",
    footer:"By default your data stays in this browser only. With Supabase configured (see README) it syncs across your devices.",
    cloudLocal:"💾 local only", cloudConnecting:"connecting…", cloudSynced:"☁ synced",
    cloudOffline:"offline (using local)", cloudOfflineSaved:"offline (saved locally)",
    startSmall:"Type your % and hit Save",
    needPct:"Enter the weekly % (the number from the Claude app)",
    saved:(d)=>"Saved ✓ ("+d+")", used:(u)=>"used "+u+"%", confirmClear:"Delete all usage history?",
    limitBig:"Limit reached", limitSmall:(r)=>"Wait for the reset ("+r+")",
    marginBig:"Plenty of margin", onpaceBig:"On pace",
    paceMsg:(cap,used,left)=>"Today you can reach "+cap+"% for the week (you're at "+used+"%). "+left+"% left for today.",
    fastBig:"Going fast, ease up",
    fastMsg:(cap,used,rate,r)=>"Today's cap was "+cap+"% and you're already at "+used+"%. Spread it out: "+rate+"%/day until "+r+".",
    locale:"en-US"
  },
  es: {
    appTitle:"Ritmo de uso de Claude",
    sub:"Reparte tu % semanal sin gastarlo antes de tiempo. Teclea el % que ves en la app de Claude y te dice hasta dónde puedes llegar hoy. Funciona sin conexión; sincronización opcional entre dispositivos (ver README).",
    pctLabel:"% semanal usado (todos los modelos)", sonnetLabel:"% Sonnet usado (opcional)",
    pctPh:"ej. 4", sonnetPh:"ej. 3",
    saveBtn:"Guardar lo de hoy",
    capLabel:"HOY puedes llegar hasta", todayLabel:"te queda para hoy", rateLabel:"ritmo por día", daysLabel:"días al reset",
    gaugeHint:"El azul = lo que llevas usado. La rayita blanca = el tope hasta donde puedes llegar HOY. Llena el azul hasta la rayita y vas perfecto.",
    paceTick:"tope hoy",
    weekTitle:"Tu semana", emptyLog:"Aún no has registrado nada esta semana.",
    settingsTitle:"Ajustes", resetLabel:"Fecha de reinicio semanal",
    resetHint:"El ciclo es de 7 días y se renueva solo cada semana. Si tu reset es otro día, cámbialo aquí.",
    clearSummary:"Borrar mi historial", clearBtn:"Borrar todo el registro",
    footer:"Por defecto, tus datos se guardan solo en este navegador. Si configuras Supabase (ver README), se sincronizan entre tus dispositivos.",
    cloudLocal:"💾 solo local", cloudConnecting:"conectando…", cloudSynced:"☁ sincronizado",
    cloudOffline:"sin conexión (uso local)", cloudOfflineSaved:"sin conexión (guardado local)",
    startSmall:"Teclea tu % y pulsa Guardar",
    needPct:"Pon el % semanal (el número de la app de Claude)",
    saved:(d)=>"Guardado ✓ ("+d+")", used:(u)=>"usado "+u+"%", confirmClear:"¿Borrar todo el historial de uso?",
    limitBig:"Límite alcanzado", limitSmall:(r)=>"Toca esperar al reset ("+r+")",
    marginBig:"Te sobra margen", onpaceBig:"Vas en ritmo",
    paceMsg:(cap,used,left)=>"Hoy puedes llegar hasta el "+cap+"% semanal (llevas "+used+"%). Te queda +"+left+"% para hoy.",
    fastBig:"Vas rápido, frena",
    fastMsg:(cap,used,rate,r)=>"Hoy tocaba como mucho el "+cap+"% y ya vas en "+used+"%. Si lo repartes, "+rate+"%/día hasta el "+r+".",
    locale:"es-ES"
  }
};

const CLOUD_ENABLED = !!(SUPABASE_URL && SUPABASE_KEY);
let sb = null;
if(CLOUD_ENABLED){ try{ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }catch(e){ sb = null; } }

const DAY = 86400000;
const KEY = 'pacerClaude_v2';
function load(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
function saveLocal(s){ localStorage.setItem(KEY, JSON.stringify(s)); }

let s = load();
if(!s.nextReset) s.nextReset = '2026-07-03';
if(!s.cycleDays) s.cycleDays = 7;
if(!Array.isArray(s.log)) s.log = [];
saveLocal(s);

let lang = s.lang || ((navigator.language||'en').toLowerCase().indexOf('es')===0 ? 'es' : 'en');
function t(){ return T[lang]; }

function applyI18n(){
  document.documentElement.lang = lang;
  document.title = t().appTitle;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t()[el.dataset.i18n]; });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{ el.placeholder = t()[el.dataset.i18nPh]; });
  document.getElementById('lang').value = lang;
}

function setCloud(state, txt){
  const el = document.getElementById('cloud');
  el.className = 'cloud' + (state?(' '+state):'');
  el.textContent = txt;
}

// ---------- Cloud (optional) ----------
async function pull(){
  if(!sb){ setCloud('off', t().cloudLocal); return; }
  try{
    const cfg = await sb.from('pacer_config').select('reset_date,cycle_days').eq('owner',OWNER).maybeSingle();
    if(cfg.data){ if(cfg.data.reset_date) s.nextReset = cfg.data.reset_date; if(cfg.data.cycle_days) s.cycleDays = cfg.data.cycle_days; }
    const rows = await sb.from('pacer_uso').select('fecha,pct,sonnet').eq('owner',OWNER).order('fecha',{ascending:true});
    if(rows.error) throw rows.error;
    s.log = (rows.data||[]).map(r=>({ date:r.fecha, pct:Number(r.pct), sonnet:(r.sonnet==null?null:Number(r.sonnet)) }));
    saveLocal(s); setCloud('ok', t().cloudSynced); render();
  }catch(e){ setCloud('off', t().cloudOffline); }
}
async function pushDay(entry){
  if(!sb){ return; }
  try{
    const { error } = await sb.from('pacer_uso').upsert({ owner:OWNER, fecha:entry.date, pct:entry.pct, sonnet:entry.sonnet, updated_at:new Date().toISOString() }, { onConflict:'owner,fecha' });
    if(error) throw error; setCloud('ok', t().cloudSynced);
  }catch(e){ setCloud('off', t().cloudOfflineSaved); }
}
async function pushConfig(){
  if(!sb) return;
  try{ await sb.from('pacer_config').upsert({ owner:OWNER, reset_date:s.nextReset, cycle_days:s.cycleDays, updated_at:new Date().toISOString() }, { onConflict:'owner' }); setCloud('ok', t().cloudSynced); }catch(e){ setCloud('off', t().cloudOffline); }
}
async function clearCloud(){ if(!sb) return; try{ await sb.from('pacer_uso').delete().eq('owner',OWNER); }catch(e){} }

// ---------- Math / UI ----------
function todayStr(d){ d = d || new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function currentReset(){
  let reset = new Date(s.nextReset+'T00:00:00'); const now = new Date(); let g = 0;
  while(now >= reset && g < 520){ reset = new Date(reset.getTime() + s.cycleDays*DAY); g++; }
  return reset;
}
function latestUsed(){
  const reset = currentReset(); const start = new Date(reset.getTime() - s.cycleDays*DAY);
  const inCycle = s.log.filter(e => new Date(e.date+'T12:00:00') >= start);
  return inCycle.length ? inCycle[inCycle.length-1].pct : null;
}
function fmt(n){ return (Math.round(n*10)/10).toString(); }

function render(){
  document.getElementById('resetDate').value = s.nextReset;
  const reset = currentReset();
  const start = new Date(reset.getTime() - s.cycleDays*DAY);
  const now = new Date();
  const total = reset - start;
  const endToday = new Date(now); endToday.setHours(23,59,59,999);
  const fracEndToday = Math.min(Math.max((endToday - start),0)/total, 1);
  const daysRemaining = Math.max((reset - now)/DAY, 0.01);
  const used = latestUsed();

  const banner = document.getElementById('banner');
  const big = document.getElementById('bigMsg');
  const small = document.getElementById('smallMsg');

  const capToday = Math.min(fracEndToday*100, 100);
  document.getElementById('paceMark').style.left = capToday + '%';
  document.getElementById('paceMark').dataset.label = t().paceTick;
  document.getElementById('sDays').textContent = fmt(daysRemaining);

  if(used === null){
    document.getElementById('fill').style.width = '0%';
    document.getElementById('usedLbl').textContent = t().used(0);
    document.getElementById('sCap').textContent = '—';
    document.getElementById('sToday').textContent = '—';
    document.getElementById('sRate').textContent = '—';
    big.textContent = '—';
    small.textContent = t().startSmall;
    banner.className = 'banner b-green';
    renderLog(start);
    return;
  }

  document.getElementById('fill').style.width = Math.min(used,100) + '%';
  document.getElementById('usedLbl').textContent = t().used(fmt(used));

  const allowanceToday = Math.max(capToday - used, 0);
  const ratePerDay = Math.max((100 - used)/daysRemaining, 0);
  document.getElementById('sCap').textContent = fmt(capToday) + '%';
  document.getElementById('sToday').textContent = '+' + fmt(allowanceToday) + '%';
  document.getElementById('sRate').textContent = fmt(ratePerDay) + '%';

  const resetTxt = reset.toLocaleDateString(t().locale,{day:'numeric',month:'short'});
  const surplus = capToday - used;

  if(used >= 100){
    big.textContent = t().limitBig; small.textContent = t().limitSmall(resetTxt); banner.className = 'banner b-red';
  } else if(surplus >= 5){
    big.textContent = t().marginBig; small.textContent = t().paceMsg(fmt(capToday),fmt(used),fmt(allowanceToday)); banner.className = 'banner b-green';
  } else if(used > capToday + 1){
    big.textContent = t().fastBig; small.textContent = t().fastMsg(fmt(capToday),fmt(used),fmt(ratePerDay),resetTxt); banner.className = 'banner b-red';
  } else {
    big.textContent = t().onpaceBig; small.textContent = t().paceMsg(fmt(capToday),fmt(used),fmt(allowanceToday)); banner.className = 'banner b-amber';
  }
  renderLog(start);
}

function renderLog(start){
  const list = document.getElementById('logList');
  const empty = document.getElementById('emptyLog');
  const inCycle = s.log.filter(e => new Date(e.date+'T12:00:00') >= start).slice(-10);
  if(!inCycle.length){ list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  list.innerHTML = inCycle.map(e=>{
    const d = new Date(e.date+'T12:00:00');
    const dl = d.toLocaleDateString(t().locale,{weekday:'short',day:'numeric'});
    const son = (e.sonnet!=null) ? ' · Sonnet '+fmt(e.sonnet)+'%' : '';
    return '<div class="logrow"><div class="d">'+dl+'</div>'+
           '<div class="bar"><i style="width:'+Math.min(e.pct,100)+'%"></i></div>'+
           '<div class="v">'+fmt(e.pct)+'%'+'</div></div>'+
           (son?'<div class="hint" style="margin:-4px 0 8px 90px">'+son.trim()+'</div>':'');
  }).join('');
}

// ---------- Events ----------
document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const v = parseFloat(document.getElementById('pct').value);
  if(isNaN(v)){ alert(t().needPct); return; }
  const sonV = document.getElementById('sonnet').value;
  const tt = todayStr();
  const entry = { date:tt, pct:v, sonnet: sonV===''?null:parseFloat(sonV) };
  const existing = s.log.find(e=>e.date===tt);
  if(existing){ existing.pct = entry.pct; existing.sonnet = entry.sonnet; } else { s.log.push(entry); }
  s.log.sort((a,b)=> a.date<b.date?-1:1);
  saveLocal(s);
  document.getElementById('savedHint').textContent = t().saved(tt);
  render();
  await pushDay(entry);
});
document.getElementById('resetDate').addEventListener('change', async e=>{
  if(e.target.value){ s.nextReset = e.target.value; saveLocal(s); render(); await pushConfig(); }
});
document.getElementById('clearBtn').addEventListener('click', async ()=>{
  if(confirm(t().confirmClear)){ s.log = []; saveLocal(s); render(); document.getElementById('savedHint').textContent=''; await clearCloud(); }
});
document.getElementById('lang').addEventListener('change', e=>{
  lang = e.target.value; s.lang = lang; saveLocal(s); applyI18n(); render();
});

// ---------- Start ----------
applyI18n();
(function(){ const u = latestUsed(); if(u!=null) document.getElementById('pct').value = u; })();
setCloud(CLOUD_ENABLED?'':'off', CLOUD_ENABLED ? t().cloudConnecting : t().cloudLocal);
render();
if(CLOUD_ENABLED) pull();
</script>
</body>
</html>
